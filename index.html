<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunu-Idées</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar-sunu d-flex justify-content-between align-items-center">
    <a href="#" class="brand">💡 Sunu-Idées</a>
    <div class="user-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
      </svg>
    </div>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="container-fluid px-0">
      <div class="row g-4">

        <!-- FORMULAIRE -->
        <div class="col-12 col-lg-3">
          <div class="form-card">
            <h2>Soumettre une idée</h2>
            <form id="Formulaire">
              <div class="mb-3">
                <label class="form-label" for="Titre">Titre</label>
                <input type="text" class="form-control" id="Titre" placeholder="Titre de l'idée..."  required/>
                <button type="button" id="btnSuggerer" class="btn btn-outline-success btn-sm mt-2 w-100">
                  Suggérer avec l'IA
                </button>
              </div>
              <div class="mb-3">
                <label class="form-label" for="Categorie">Catégorie</label>
                <select class="form-select" id="Categorie" required>
                  <option value="">Sélectionnez une catégorie</option>
                  <option value="Pédagogie">Pédagogie</option>
                  <option value="Événement">Événement</option>
                  <option value="Vie de campus">Vie de campus</option>
                  <option value="Technologie">Technologie</option>
                  <option value="Autre">Autre</option>
                </select>
              </div>
              <div class="mb-4">
                <label class="form-label" for="Description">Description</label>
                <textarea class="form-control" id="Description" rows="5" placeholder="Décrivez votre idée..." required></textarea>
              </div>
              <button type="submit" class="btn-soumettre">Soumettre</button>
            </form>
          </div>
        </div>

        <!-- MUR D'IDÉES -->
        <div class="col-12 col-lg-9">
          <h1 class="mur-titre">Mur d'idées</h1>
          <div class="row g-3" id="MurIdees">
            <!--  Les idées soumises seront affichées ici sous forme de cartes -->
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="d-flex justify-content-between align-items-center flex-wrap gap-2">
    <span>© 2026 Sunu-Idées. All rights reserved.</span>
    <div class="d-flex gap-3">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Contact</a>
    </div>
  </footer>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
